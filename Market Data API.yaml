          \                                                                      \
          \                 "
        required: true
      - in: query
        name: date
        schema:
          type: string
          format: date
        description: 'Use to lookup a historical list of strikes from a specific previous
          trading day. If date is omitted the strikes will be from the current trading
          day during market hours or from the last trading day when the market is
          closed. Accepted date inputs: ISO 8601, unix, spreadsheet.'
      - in: query
        name: expiration
        schema:
          type: string
          format: date
        description: 'imit the lookup of strikes to options that expire on a specific
          expiration date. Accepted date inputs: ISO 8601, unix, spreadsheet.'
      - in: query
        name: dateformat
        schema:
          type: string
          enum:
